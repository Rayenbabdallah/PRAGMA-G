name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric==2.5.3
          pip install -r requirements.txt
          # evidently pulls in litestar -> multipart (bottle's single-file
          # parser), which shadows python-multipart's `multipart` package and
          # breaks gradio's `from multipart.multipart import ...` import.
          # We don't use litestar directly, so drop it.
          pip uninstall -y multipart

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Data validation gate
        run: |
          python -c "
          from src.tokenizer.vocab import Vocab
          # Run on tiny synthetic batch to validate pipeline integrity
          import pandas as pd, numpy as np
          n = 1000
          df = pd.DataFrame({
              'Timestamp': pd.date_range('2024-01-01', periods=n, freq='1min'),
              'From Bank': np.random.choice(['BankA','BankB','BankC'], n),
              'Account': [f'ACC_{i%50}' for i in range(n)],
              'To Bank': np.random.choice(['BankA','BankB','BankC'], n),
              'Account.1': [f'ACC_{(i+7)%50}' for i in range(n)],
              'Amount Received': np.random.lognormal(4, 1, n),
              'Receiving Currency': np.random.choice(['USD','EUR','GBP'], n),
              'Amount Paid': np.random.lognormal(4, 1, n),
              'Payment Currency': np.random.choice(['USD','EUR','GBP'], n),
              'Payment Format': np.random.choice(['Wire','Cheque','Credit Card'], n),
              'Is Laundering': np.random.choice([0,1], n, p=[0.95, 0.05]),
          })
          vocab = Vocab()
          vocab.build(df)
          assert len(vocab.key2id) > 5, 'Key vocab too small'
          print('Vocab gate: PASSED')

          # Evidently data-quality test suite: two synthetic batches from the
          # same generator should not trip any data-quality checks (missing
          # values, constant/duplicated columns, duplicated rows, schema drift).
          from evidently.test_suite import TestSuite
          from evidently.tests import (
              TestNumberOfColumnsWithMissingValues,
              TestNumberOfRowsWithMissingValues,
              TestNumberOfConstantColumns,
              TestNumberOfDuplicatedRows,
              TestNumberOfDuplicatedColumns,
              TestColumnsType,
          )
          from src.training.dataset import make_synthetic_transactions_df

          ref = make_synthetic_transactions_df(n=500, seed=1)
          cur = make_synthetic_transactions_df(n=500, seed=2)
          suite = TestSuite(tests=[
              TestNumberOfColumnsWithMissingValues(),
              TestNumberOfRowsWithMissingValues(),
              TestNumberOfConstantColumns(),
              TestNumberOfDuplicatedRows(),
              TestNumberOfDuplicatedColumns(),
              TestColumnsType(),
          ])
          suite.run(reference_data=ref, current_data=cur)
          summary = suite.as_dict()['summary']
          assert summary['all_passed'], f'Evidently data-quality tests failed: {summary}'
          print('Evidently data-quality gate: PASSED')
          "
